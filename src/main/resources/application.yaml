# ===========================================
# Spring Boot 应用配置文件
# ===========================================

# Spring 配置
spring:
  # 应用基本配置
  application:
    # 应用名称，用于服务注册、日志标识等
    name: data_demo_002
  
  # 数据库配置
  datasource:
    # 使用环境变量或默认值配置数据库连接
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:data_demo_002_java}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP 连接池配置
    hikari:
      maximum-pool-size: 10        # 最大连接数
      minimum-idle: 5              # 最小空闲连接数
      idle-timeout: 300000         # 空闲超时时间（毫秒）
      connection-timeout: 20000    # 连接超时时间（毫秒）
      max-lifetime: 600000         # 连接最大生命周期（毫秒）

  # Jackson 序列化配置（处理 JSON 时间格式）
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

  # 字符编码配置（解决中文乱码）
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true

  #邮箱配置
  mail:
    host: smtp.qq.com
    username: ${EMAIL_USER:<EMAIL>}
    password: ${EMAIL_USER_PASSWORD:<PASSWORD>}
    port: 465
    protocol: smtps
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
        debug: true

  data:
    redis:
      host: localhost
      port: 6379
      password: MyRedis@2024
      # 可选：配置数据库索引
      # database: 0
      # 连接池配置
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0


# 服务器端口配置
server:
  port: 8081
  
# MyBatis-Plus ORM 框架配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  
  mapper-locations: classpath*:/generator/mapper/**/*.xml
  type-aliases-package: com.example.data_demo_002.common.base.domain

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

  packages-to-scan: com.example.data_demo_002.modules
  show-actuator: false

# 日志配置
logging:
  level:
    # MyBatis-Plus 日志级别：DEBUG
    # 作用：在控制台打印 SQL 语句、参数和执行时间，便于调试数据库操作
    org.mybatis: ERROR
    
    # Spring Bean 工厂日志级别：DEBUG
    # 作用：打印 Bean 的创建、依赖注入等详细信息，便于排查启动问题
    org.springframework.beans.factory: ERROR

jwt:
  secret: "MySuperSecretKeyForJwtTokenGeneration2026NeverShareThisKey1234567890"
  access-expiration: 1800000
  refresh-expiration: 604800000
  prefix: "Bearer "